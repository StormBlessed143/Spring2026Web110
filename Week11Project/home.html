<!DOCTYPE html>

<html lang="en-us">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		
		<title>Contact Us</title>
		
		<link rel="stylesheet" href="styles.css">
	</head>
	
	<body>
		<h3>Contact Our Team</h3>
		
		<p>Please complete the form below and we'll get back to you as soon as possible.</p>
		
		<form action="https://webdevbasics.net/scripts/demo.php">
			<label for="fullname">Full name</label>
			<input type="text" id="fullname" name="fullname" required>
			
			<label for="email">Email</label>
			<input type="email" id="email" name="email" required>
			
			<label for="phone">Phone Number</label>
			<input type="tel" id="phone" name="phone">
			
			<label for="topic">Topic</label>
			<select id="topic" name="topic">
				<option value="general">General Inquiry</option>
				<option value="support">Support</option>
				<option value="feedback">Feedback</option>
			</select>
			
			<label for="message">Message</label>
			<textarea id="message" name="message" rows="5" required></textarea>
			
			<input type="submit" value="Send Message">
		</form>
	
		<footer>
			<small><a href="https://stormblessed143.github.io/Spring2026Web110/">Return to landing page</a></small>
		</footer>
	</body>
</html>
